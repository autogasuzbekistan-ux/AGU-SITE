<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGU - Faoliyat Loglari</title>

    <!-- AGU Components -->
    <script src="../components/agu-branding.js"></script>
    <script src="../components/agu-navbar-owner.js"></script>
    <script src="../components/agu-performance.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .activity-card {
            transition: all 0.3s ease;
        }

        .activity-card:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .activity-icon {
            transition: transform 0.3s ease;
        }

        .activity-card:hover .activity-icon {
            transform: scale(1.2);
        }

        .stat-card {
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- AGU Navbar -->
    <div id="agu-navbar"></div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-24 right-5 bg-green-500 text-white py-3 px-6 rounded-lg shadow-lg transform translate-x-[120%] transition-transform duration-500 z-50">
        <span id="toast-message"></span>
    </div>

    <!-- Main Container -->
    <div class="container mx-auto px-6 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">
                <i class="fas fa-history mr-3 text-purple-600"></i>Faoliyat Loglari
            </h1>
            <p class="text-gray-600">Tizimda sodir bo'lgan barcha harakatlar tarixi</p>
        </div>

        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- Today's Activities -->
            <div class="stat-card bg-gradient-to-br from-blue-500 to-blue-700 text-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-blue-100 text-sm font-medium mb-1">Bugun</p>
                        <p class="text-3xl font-bold" id="today-count">0</p>
                    </div>
                    <div class="bg-white bg-opacity-20 rounded-full p-4">
                        <i class="fas fa-clock text-3xl"></i>
                    </div>
                </div>
            </div>

            <!-- This Week -->
            <div class="stat-card bg-gradient-to-br from-green-500 to-green-700 text-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-green-100 text-sm font-medium mb-1">Bu Hafta</p>
                        <p class="text-3xl font-bold" id="week-count">0</p>
                    </div>
                    <div class="bg-white bg-opacity-20 rounded-full p-4">
                        <i class="fas fa-calendar-week text-3xl"></i>
                    </div>
                </div>
            </div>

            <!-- Total Users -->
            <div class="stat-card bg-gradient-to-br from-purple-500 to-pink-600 text-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-purple-100 text-sm font-medium mb-1">Faol Foydalanuvchilar</p>
                        <p class="text-3xl font-bold" id="users-count">0</p>
                    </div>
                    <div class="bg-white bg-opacity-20 rounded-full p-4">
                        <i class="fas fa-users text-3xl"></i>
                    </div>
                </div>
            </div>

            <!-- Total Activities -->
            <div class="stat-card bg-gradient-to-br from-orange-500 to-red-600 text-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-orange-100 text-sm font-medium mb-1">Jami Faoliyat</p>
                        <p class="text-3xl font-bold" id="total-count">0</p>
                    </div>
                    <div class="bg-white bg-opacity-20 rounded-full p-4">
                        <i class="fas fa-chart-line text-3xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Search -->
                <input
                    type="text"
                    id="search-input"
                    placeholder="Qidirish..."
                    class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                >

                <!-- User Filter -->
                <select id="user-filter" class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                    <option value="">Barcha foydalanuvchilar</option>
                    <option value="owner">Owner</option>
                    <option value="admin">Admin</option>
                    <option value="kontragent">Kontragent</option>
                </select>

                <!-- Action Type Filter -->
                <select id="action-filter" class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all">
                    <option value="">Barcha harakatlar</option>
                    <option value="create">Yaratish</option>
                    <option value="update">Yangilash</option>
                    <option value="delete">O'chirish</option>
                    <option value="login">Kirish</option>
                    <option value="logout">Chiqish</option>
                </select>

                <!-- Date Filter -->
                <input
                    type="date"
                    id="date-filter"
                    class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                >
            </div>
        </div>

        <!-- Activities Timeline -->
        <div id="activities-timeline" class="space-y-4">
            <!-- Loading State -->
            <div class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-16 w-16 border-b-4 border-purple-600"></div>
                <p class="text-gray-600 mt-4 text-lg">Faoliyatlar yuklanmoqda...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api';
        let activities = [];
        let filteredActivities = [];

        // Toast Notification
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');

            toastMessage.textContent = message;
            toast.className = `fixed top-24 right-5 text-white py-3 px-6 rounded-lg shadow-lg transform transition-transform duration-500 z-50 ${isError ? 'bg-red-500' : 'bg-green-500'}`;

            toast.classList.remove('translate-x-[120%]');
            toast.classList.add('translate-x-0');

            setTimeout(() => {
                toast.classList.remove('translate-x-0');
                toast.classList.add('translate-x-[120%]');
            }, 4000);
        }

        // Check Authentication
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (!token || user.role !== 'owner') {
                window.location.href = '../index.html';
                return false;
            }
            return true;
        }

        // Get Activity Icon
        function getActivityIcon(action) {
            const icons = {
                'create': 'fa-plus-circle text-green-600',
                'update': 'fa-edit text-blue-600',
                'delete': 'fa-trash text-red-600',
                'login': 'fa-sign-in-alt text-purple-600',
                'logout': 'fa-sign-out-alt text-orange-600',
                'view': 'fa-eye text-gray-600',
                'download': 'fa-download text-indigo-600',
                'upload': 'fa-upload text-pink-600'
            };
            return icons[action] || 'fa-circle text-gray-400';
        }

        // Get Activity Color
        function getActivityColor(action) {
            const colors = {
                'create': 'border-green-500 bg-green-50',
                'update': 'border-blue-500 bg-blue-50',
                'delete': 'border-red-500 bg-red-50',
                'login': 'border-purple-500 bg-purple-50',
                'logout': 'border-orange-500 bg-orange-50'
            };
            return colors[action] || 'border-gray-400 bg-gray-50';
        }

        // Format Time Ago
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);

            if (seconds < 60) return seconds + ' soniya oldin';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + ' daqiqa oldin';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + ' soat oldin';
            const days = Math.floor(hours / 24);
            if (days < 7) return days + ' kun oldin';
            const weeks = Math.floor(days / 7);
            return weeks + ' hafta oldin';
        }

        // Generate Mock Activities
        function generateMockActivities() {
            const actions = ['create', 'update', 'delete', 'login', 'logout'];
            const users = ['Admin Adminov', 'Kontragent 1', 'Kontragent 2', 'Owner User'];
            const entities = ['mahsulot', 'buyurtma', 'kontragent', 'omborxona', 'transfer'];

            const mockActivities = [];
            const now = new Date();

            for (let i = 0; i < 50; i++) {
                const action = actions[Math.floor(Math.random() * actions.length)];
                const user = users[Math.floor(Math.random() * users.length)];
                const entity = entities[Math.floor(Math.random() * entities.length)];

                const date = new Date(now - Math.random() * 7 * 24 * 60 * 60 * 1000); // Last 7 days

                mockActivities.push({
                    id: i + 1,
                    user_name: user,
                    action: action,
                    description: `${entity} ${action === 'create' ? 'yaratdi' : action === 'update' ? 'yangiladi' : action === 'delete' ? "o'chirdi" : action === 'login' ? 'tizimga kirdi' : 'tizimdan chiqdi'}`,
                    entity: entity,
                    created_at: date.toISOString(),
                    ip_address: '192.168.1.' + Math.floor(Math.random() * 255)
                });
            }

            return mockActivities.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        }

        // Load Activities
        async function loadActivities() {
            try {
                // For now, use mock data (API endpoint will be implemented later)
                activities = generateMockActivities();
                filteredActivities = [...activities];
                renderActivities();
                updateStatistics();
            } catch (error) {
                console.error('Activities load error:', error);
                showToast('Faoliyatlarni yuklashda xatolik', true);
                document.getElementById('activities-timeline').innerHTML = `
                    <div class="text-center py-12 bg-white rounded-xl">
                        <i class="fas fa-exclamation-circle text-6xl text-red-400 mb-4"></i>
                        <p class="text-gray-600 text-lg">Faoliyatlarni yuklashda xatolik yuz berdi</p>
                    </div>
                `;
            }
        }

        // Update Statistics
        function updateStatistics() {
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const weekStart = new Date(now - 7 * 24 * 60 * 60 * 1000);

            const todayCount = activities.filter(a => new Date(a.created_at) >= todayStart).length;
            const weekCount = activities.filter(a => new Date(a.created_at) >= weekStart).length;
            const uniqueUsers = new Set(activities.map(a => a.user_name)).size;

            document.getElementById('today-count').textContent = todayCount;
            document.getElementById('week-count').textContent = weekCount;
            document.getElementById('users-count').textContent = uniqueUsers;
            document.getElementById('total-count').textContent = activities.length;
        }

        // Render Activities
        function renderActivities() {
            const timeline = document.getElementById('activities-timeline');

            if (filteredActivities.length === 0) {
                timeline.innerHTML = `
                    <div class="text-center py-16 bg-white rounded-xl">
                        <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-600 text-xl font-semibold">Faoliyatlar topilmadi</p>
                        <p class="text-gray-500 mt-2">Hozircha hech qanday faoliyat mavjud emas</p>
                    </div>
                `;
                return;
            }

            timeline.innerHTML = filteredActivities.map(activity => `
                <div class="activity-card bg-white rounded-xl shadow-lg p-6 border-l-4 ${getActivityColor(activity.action)}">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start gap-4 flex-1">
                            <!-- Icon -->
                            <div class="activity-icon bg-white rounded-full p-3 shadow-md">
                                <i class="fas ${getActivityIcon(activity.action)} text-2xl"></i>
                            </div>

                            <!-- Content -->
                            <div class="flex-1">
                                <div class="flex items-center gap-3 mb-2">
                                    <h3 class="text-lg font-bold text-gray-800">${activity.user_name}</h3>
                                    <span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded-full font-semibold">
                                        ${activity.action.toUpperCase()}
                                    </span>
                                </div>
                                <p class="text-gray-700 mb-2">${activity.description}</p>
                                <div class="flex items-center gap-4 text-sm text-gray-500">
                                    <span><i class="fas fa-clock mr-1"></i>${timeAgo(activity.created_at)}</span>
                                    <span><i class="fas fa-network-wired mr-1"></i>${activity.ip_address}</span>
                                    <span><i class="fas fa-calendar mr-1"></i>${new Date(activity.created_at).toLocaleDateString('uz-UZ')}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Time -->
                        <div class="text-right text-sm text-gray-500">
                            ${new Date(activity.created_at).toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' })}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Filter Activities
        function filterActivities() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const userFilter = document.getElementById('user-filter').value;
            const actionFilter = document.getElementById('action-filter').value;
            const dateFilter = document.getElementById('date-filter').value;

            filteredActivities = [...activities];

            // Search filter
            if (searchTerm) {
                filteredActivities = filteredActivities.filter(activity =>
                    activity.user_name.toLowerCase().includes(searchTerm) ||
                    activity.description.toLowerCase().includes(searchTerm) ||
                    activity.entity.toLowerCase().includes(searchTerm)
                );
            }

            // User filter
            if (userFilter) {
                filteredActivities = filteredActivities.filter(activity =>
                    activity.user_name.toLowerCase().includes(userFilter.toLowerCase())
                );
            }

            // Action filter
            if (actionFilter) {
                filteredActivities = filteredActivities.filter(activity =>
                    activity.action === actionFilter
                );
            }

            // Date filter
            if (dateFilter) {
                const filterDate = new Date(dateFilter);
                const nextDay = new Date(filterDate);
                nextDay.setDate(nextDay.getDate() + 1);

                filteredActivities = filteredActivities.filter(activity => {
                    const activityDate = new Date(activity.created_at);
                    return activityDate >= filterDate && activityDate < nextDay;
                });
            }

            renderActivities();
        }

        // Event Listeners
        document.getElementById('search-input').addEventListener('input', AGU_PERFORMANCE.debounce(filterActivities, 300));
        document.getElementById('user-filter').addEventListener('change', filterActivities);
        document.getElementById('action-filter').addEventListener('change', filterActivities);
        document.getElementById('date-filter').addEventListener('change', filterActivities);

        // Initialize
        if (checkAuth()) {
            loadActivities();
        }
    </script>
</body>
</html>
