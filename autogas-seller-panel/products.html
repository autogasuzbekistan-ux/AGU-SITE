<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGU - Mahsulotlar</title>

    <!-- AGU Components -->
    <script src="components/agu-branding.js"></script>
    <script src="components/agu-navbar.js"></script>
    <script src="components/agu-performance.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .product-card {
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-preview {
            max-width: 200px;
            max-height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- AGU Navbar -->
    <div id="agu-navbar"></div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-20 right-5 bg-green-500 text-white py-3 px-6 rounded-lg shadow-lg transform translate-x-[120%] transition-transform duration-500 z-50">
        <span id="toast-message"></span>
    </div>

    <!-- Main Container -->
    <div class="container mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">
                    <i class="fas fa-box-open mr-2 text-blue-600"></i>Mahsulotlar
                </h1>
                <p class="text-gray-600 mt-1">Mahsulotlarni boshqarish va sotish</p>
            </div>
            <button onclick="openCreateModal()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all transform hover:scale-105 shadow-lg">
                <i class="fas fa-plus mr-2"></i>Yangi Mahsulot
            </button>
        </div>

        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">Jami Mahsulotlar</p>
                        <p id="totalProducts" class="text-3xl font-bold text-gray-800">0</p>
                    </div>
                    <div class="bg-blue-100 p-4 rounded-full">
                        <i class="fas fa-box-open text-3xl text-blue-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">Mavjud</p>
                        <p id="inStockProducts" class="text-3xl font-bold text-green-600">0</p>
                    </div>
                    <div class="bg-green-100 p-4 rounded-full">
                        <i class="fas fa-check-circle text-3xl text-green-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">Tugagan</p>
                        <p id="outOfStockProducts" class="text-3xl font-bold text-red-600">0</p>
                    </div>
                    <div class="bg-red-100 p-4 rounded-full">
                        <i class="fas fa-times-circle text-3xl text-red-600"></i>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600 text-sm">Umumiy Qiymat</p>
                        <p id="totalValue" class="text-3xl font-bold text-purple-600">0</p>
                    </div>
                    <div class="bg-purple-100 p-4 rounded-full">
                        <i class="fas fa-money-bill-wave text-3xl text-purple-600"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters and Actions -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Qidirish</label>
                    <input type="text" id="searchInput" placeholder="Mahsulot nomi..." class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Kategoriya</label>
                    <select id="categoryFilter" onchange="filterProducts()" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                        <option value="">Barcha kategoriyalar</option>
                        <option value="Gaz Ballonlari">Gaz Ballonlari</option>
                        <option value="Gaz Uskunalari">Gaz Uskunalari</option>
                        <option value="Ehtiyot Qismlar">Ehtiyot Qismlar</option>
                        <option value="Aksessuarlar">Aksessuarlar</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="statusFilter" onchange="filterProducts()" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                        <option value="">Barcha statuslar</option>
                        <option value="in_stock">Mavjud</option>
                        <option value="out_of_stock">Tugagan</option>
                        <option value="low_stock">Kam qoldi</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Saralash</label>
                    <select id="sortBy" onchange="sortProducts()" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                        <option value="name">Nom (A-Z)</option>
                        <option value="name_desc">Nom (Z-A)</option>
                        <option value="price_asc">Narx (Arzon)</option>
                        <option value="price_desc">Narx (Qimmat)</option>
                        <option value="created_at">Eng yangi</option>
                    </select>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-3 mt-4 pt-4 border-t">
                <button onclick="clearFilters()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-all">
                    <i class="fas fa-redo mr-2"></i>Tozalash
                </button>
                <button onclick="exportToCSV()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all">
                    <i class="fas fa-file-export mr-2"></i>CSV Export
                </button>
                <div class="ml-auto text-sm text-gray-600">
                    <span id="filteredCount">0</span> ta mahsulot
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="bg-white rounded-lg shadow-lg p-12 text-center">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mb-4"></div>
            <p class="text-gray-600 text-lg">Mahsulotlar yuklanmoqda...</p>
        </div>

        <!-- Products Grid -->
        <div id="productsGrid" class="hidden grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Products will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden bg-white rounded-lg shadow-lg p-12 text-center">
            <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">Mahsulotlar topilmadi</h3>
            <p class="text-gray-500 mb-6">Yangi mahsulot qo'shing yoki filtrlarni o'zgartiring</p>
            <button onclick="openCreateModal()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                <i class="fas fa-plus mr-2"></i>Yangi Mahsulot Qo'shish
            </button>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="productModal" class="modal">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-6 py-4 rounded-t-lg">
                <h2 id="modalTitle" class="text-2xl font-bold text-white">Yangi Mahsulot</h2>
            </div>

            <form id="productForm" class="p-6">
                <input type="hidden" id="productId">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Mahsulot nomi -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Mahsulot Nomi *</label>
                        <input type="text" id="productName" required class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500" placeholder="Masalan: Gaz Balloni 12L">
                    </div>

                    <!-- Kategoriya -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Kategoriya *</label>
                        <select id="productCategory" required class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
                            <option value="">Tanlang</option>
                            <option value="Gaz Ballonlari">Gaz Ballonlari</option>
                            <option value="Gaz Uskunalari">Gaz Uskunalari</option>
                            <option value="Ehtiyot Qismlar">Ehtiyot Qismlar</option>
                            <option value="Aksessuarlar">Aksessuarlar</option>
                        </select>
                    </div>

                    <!-- Narx -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Narx (so'm) *</label>
                        <input type="number" id="productPrice" required min="0" step="0.01" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500" placeholder="100000">
                    </div>

                    <!-- Tavsif -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tavsif</label>
                        <textarea id="productDescription" rows="3" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500" placeholder="Mahsulot haqida qisqacha ma'lumot..."></textarea>
                    </div>

                    <!-- Rasm URL -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Rasm URL</label>
                        <input type="url" id="productImage" class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500" placeholder="https://example.com/image.jpg">
                        <p class="text-xs text-gray-500 mt-1">Rasm havol(asini kiriting (ixtiyoriy)</p>
                    </div>

                    <!-- Stock Status -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Status *</label>
                        <select id="productStatus" required class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500">
                            <option value="in_stock">Mavjud</option>
                            <option value="out_of_stock">Tugagan</option>
                        </select>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex justify-end space-x-4 mt-6 pt-6 border-t">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-all">
                        <i class="fas fa-times mr-2"></i>Bekor qilish
                    </button>
                    <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all">
                        <i class="fas fa-save mr-2"></i>Saqlash
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';
        let products = [];
        let filteredProducts = [];

        // Load products on page load
        window.addEventListener('load', () => {
            loadProducts();
        });

        // Load products from API
        async function loadProducts() {
            const loadingState = document.getElementById('loadingState');
            const productsGrid = document.getElementById('productsGrid');

            // Show loading
            loadingState.classList.remove('hidden');
            productsGrid.classList.add('hidden');

            try {
                const data = await AGU_PERFORMANCE.api.get('/kontragent/products');
                products = data;
                filteredProducts = [...products];
                sortProducts();
                renderProducts();
                updateStatistics();
                updateFilteredCount();
            } catch (error) {
                console.error('Load error:', error);
                showToast('Mahsulotlarni yuklashda xatolik yuz berdi', true);

                // Show empty state on error
                loadingState.classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            } finally {
                // Hide loading
                loadingState.classList.add('hidden');
            }
        }

        // Render products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const emptyState = document.getElementById('emptyState');

            if (filteredProducts.length === 0) {
                grid.classList.remove('grid');
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            grid.classList.add('grid');
            emptyState.classList.add('hidden');

            grid.innerHTML = filteredProducts.map(product => `
                <div class="bg-white rounded-lg shadow product-card overflow-hidden">
                    ${product.imageUrl ? `
                        <img src="${product.imageUrl}" alt="${product.name}" class="w-full h-48 object-cover">
                    ` : `
                        <div class="w-full h-48 bg-gray-200 flex items-center justify-center">
                            <i class="fas fa-box-open text-6xl text-gray-400"></i>
                        </div>
                    `}

                    <div class="p-4">
                        <div class="flex items-start justify-between mb-2">
                            <h3 class="font-semibold text-lg text-gray-800">${product.name}</h3>
                            <span class="px-2 py-1 rounded text-xs font-semibold ${
                                product.stockStatus === 'in_stock' ? 'bg-green-100 text-green-800' :
                                product.stockStatus === 'low_stock' ? 'bg-yellow-100 text-yellow-800' :
                                'bg-red-100 text-red-800'
                            }">
                                ${
                                    product.stockStatus === 'in_stock' ? 'Mavjud' :
                                    product.stockStatus === 'low_stock' ? 'Kam qoldi' :
                                    'Tugagan'
                                }
                            </span>
                        </div>

                        ${product.category ? `
                            <p class="text-sm text-gray-600 mb-2">
                                <i class="fas fa-tag mr-1"></i>${product.category}
                            </p>
                        ` : ''}

                        ${product.description ? `
                            <p class="text-sm text-gray-600 mb-3 line-clamp-2">${product.description}</p>
                        ` : ''}

                        <div class="flex items-center justify-between pt-3 border-t">
                            <span class="text-2xl font-bold text-blue-600">
                                ${parseFloat(product.price).toLocaleString('uz-UZ')} <span class="text-sm">so'm</span>
                            </span>
                            <div class="flex space-x-2">
                                <button onclick="editProduct(${product.id})" class="p-2 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition-all" title="Tahrirlash">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="deleteProduct(${product.id})" class="p-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition-all" title="O'chirish">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Update statistics
        function updateStatistics() {
            const total = products.length;
            const inStock = products.filter(p => p.stockStatus === 'in_stock').length;
            const outOfStock = products.filter(p => p.stockStatus === 'out_of_stock').length;
            const totalValue = products.reduce((sum, p) => sum + parseFloat(p.price || 0), 0);

            document.getElementById('totalProducts').textContent = total;
            document.getElementById('inStockProducts').textContent = inStock;
            document.getElementById('outOfStockProducts').textContent = outOfStock;
            document.getElementById('totalValue').textContent = totalValue.toLocaleString('uz-UZ') + ' so\'m';
        }

        // Filter products
        function filterProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;

            filteredProducts = products.filter(product => {
                const matchSearch = product.name.toLowerCase().includes(search);
                const matchCategory = !category || product.category === category;
                const matchStatus = !status || product.stockStatus === status;

                return matchSearch && matchCategory && matchStatus;
            });

            sortProducts();
            renderProducts();
            updateFilteredCount();
        }

        // Sort products
        function sortProducts() {
            const sortBy = document.getElementById('sortBy').value;

            switch(sortBy) {
                case 'name':
                    filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'name_desc':
                    filteredProducts.sort((a, b) => b.name.localeCompare(a.name));
                    break;
                case 'price_asc':
                    filteredProducts.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
                    break;
                case 'price_desc':
                    filteredProducts.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
                    break;
                case 'created_at':
                    filteredProducts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    break;
            }
        }

        // Update filtered count
        function updateFilteredCount() {
            document.getElementById('filteredCount').textContent = filteredProducts.length;
        }

        // Clear all filters
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('sortBy').value = 'name';
            filterProducts();
        }

        // Export to CSV
        function exportToCSV() {
            if (filteredProducts.length === 0) {
                showToast('Export qilish uchun mahsulotlar yo\'q', true);
                return;
            }

            // CSV headers
            const headers = ['ID', 'Nomi', 'Kategoriya', 'Narx', 'Status', 'Yaratilgan'];

            // CSV rows
            const rows = filteredProducts.map(p => [
                p.id,
                `"${p.name}"`,
                `"${p.category || 'N/A'}"`,
                p.price,
                p.stockStatus === 'in_stock' ? 'Mavjud' : p.stockStatus === 'low_stock' ? 'Kam qoldi' : 'Tugagan',
                new Date(p.created_at).toLocaleDateString('uz-UZ')
            ]);

            // Combine headers and rows
            const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');

            // Create download link with UTF-8 BOM
            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.setAttribute('href', url);
            link.setAttribute('download', `mahsulotlar_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast(`${filteredProducts.length} ta mahsulot export qilindi`, false);
        }

        // Open create modal
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Yangi Mahsulot';
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('productModal').classList.add('active');
        }

        // Edit product
        async function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('modalTitle').textContent = 'Mahsulotni Tahrirlash';
            document.getElementById('productId').value = product.id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category || '';
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productDescription').value = product.description || '';
            document.getElementById('productImage').value = product.imageUrl || '';
            document.getElementById('productStatus').value = product.stockStatus;

            document.getElementById('productModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        // Validate form
        function validateProductForm() {
            const name = document.getElementById('productName').value.trim();
            const price = document.getElementById('productPrice').value;
            const category = document.getElementById('productCategory').value;

            if (!name) {
                showToast('Mahsulot nomini kiriting', true);
                return false;
            }

            if (name.length < 3) {
                showToast('Mahsulot nomi kamida 3 ta belgidan iborat bo\'lishi kerak', true);
                return false;
            }

            if (!category) {
                showToast('Kategoriyani tanlang', true);
                return false;
            }

            if (!price || parseFloat(price) <= 0) {
                showToast('To\'g\'ri narx kiriting', true);
                return false;
            }

            return true;
        }

        // Submit form
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate form
            if (!validateProductForm()) {
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            const submitBtnText = submitBtn.innerHTML;

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saqlanmoqda...';

            const id = document.getElementById('productId').value;
            const data = {
                name: document.getElementById('productName').value.trim(),
                category: document.getElementById('productCategory').value,
                price: parseFloat(document.getElementById('productPrice').value),
                description: document.getElementById('productDescription').value.trim(),
                imageUrl: document.getElementById('productImage').value.trim(),
                stockStatus: document.getElementById('productStatus').value
            };

            try {
                if (id) {
                    await AGU_PERFORMANCE.api.put(`/kontragent/products/${id}`, data);
                    showToast('Mahsulot muvaffaqiyatli yangilandi!', false);
                } else {
                    await AGU_PERFORMANCE.api.post('/kontragent/products', data);
                    showToast('Mahsulot muvaffaqiyatli qo\'shildi!', false);
                }

                closeModal();
                await loadProducts();
            } catch (error) {
                console.error('Save error:', error);
                const errorMsg = error.message || 'Xatolik yuz berdi';
                showToast(errorMsg, true);
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = submitBtnText;
            }
        });

        // Delete product
        async function deleteProduct(id) {
            const product = products.find(p => p.id === id);
            const productName = product ? product.name : 'mahsulot';

            if (!confirm(`${productName} mahsulotini o'chirmoqchimisiz?\n\nBu amalni qaytarib bo'lmaydi!`)) {
                return;
            }

            // Show loading toast
            showToast('O\'chirilmoqda...', false);

            try {
                await AGU_PERFORMANCE.api.delete(`/kontragent/products/${id}`);
                showToast('Mahsulot muvaffaqiyatli o\'chirildi', false);
                await loadProducts();
            } catch (error) {
                console.error('Delete error:', error);
                const errorMsg = error.message || 'O\'chirishda xatolik';
                showToast(errorMsg, true);
            }
        }

        // Show toast notification
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');

            toastMessage.textContent = message;
            toast.className = `fixed top-20 right-5 text-white py-3 px-6 rounded-lg shadow-lg transform transition-transform duration-500 z-50 ${isError ? 'bg-red-500' : 'bg-green-500'}`;

            toast.classList.remove('translate-x-[120%]');
            toast.classList.add('translate-x-0');

            setTimeout(() => {
                toast.classList.remove('translate-x-0');
                toast.classList.add('translate-x-[120%]');
            }, 3000);
        }

        // Debounce utility function
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Close modal on outside click
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target.id === 'productModal') {
                closeModal();
            }
        });

        // Add debounced search event listener
        const debouncedFilter = debounce(filterProducts, 300);
        document.getElementById('searchInput').addEventListener('input', debouncedFilter);
    </script>
</body>
</html>
