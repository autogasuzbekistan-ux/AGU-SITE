<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGU - Inventar Boshqaruvi</title>
    <!-- AGU Navbar -->
    <script src="components/agu-navbar.js"></script>
    <script src="components/agu-performance.js"></script>
    <!-- AGU Branding -->
    <script src="components/agu-branding.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- AGU Navbar -->
    <div id="agu-navbar"></div>

    <!-- Main Container -->
    <div class="container mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">
                    <i class="fas fa-boxes mr-2"></i>Inventar
                </h1>
                <p class="text-gray-600 mt-1">Stock boshqaruvi va monitoring</p>
            </div>
            <button onclick="openAddStockModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                <i class="fas fa-plus mr-2"></i>Stock Qo'shish
            </button>
        </div>

        <!-- Statistics Cards -->
        <div id="statsCards" class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-6">
            <!-- Stats will be loaded here -->
        </div>

        <!-- Alerts -->
        <div id="alerts" class="mb-6">
            <!-- Alerts will be loaded here -->
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Ombor</label>
                    <select id="filterWarehouse" onchange="loadInventory()" class="w-full border rounded-lg p-2">
                        <option value="">Barcha omborlar</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Mahsulot</label>
                    <select id="filterProduct" onchange="loadInventory()" class="w-full border rounded-lg p-2">
                        <option value="">Barcha mahsulotlar</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Stock Holati</label>
                    <select id="filterStockStatus" onchange="loadInventory()" class="w-full border rounded-lg p-2">
                        <option value="">Hammasi</option>
                        <option value="in_stock">Mavjud</option>
                        <option value="low_stock">Kam</option>
                        <option value="out_of_stock">Tugagan</option>
                        <option value="needs_reorder">Buyurtma kerak</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Muddati</label>
                    <select id="filterExpiry" onchange="loadInventory()" class="w-full border rounded-lg p-2">
                        <option value="">Hammasi</option>
                        <option value="expiring_soon">Tez orada tugaydi</option>
                        <option value="expired">Muddati o'tgan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Saralash</label>
                    <select id="sortBy" onchange="loadInventory()" class="w-full border rounded-lg p-2">
                        <option value="created_at">Eng yangi</option>
                        <option value="quantity">Miqdor</option>
                        <option value="available_quantity">Mavjud miqdor</option>
                        <option value="total_value">Qiymat</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Mahsulot</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ombor</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Miqdor</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Mavjud</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Band</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Holat</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Qiymat</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Amallar</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody" class="bg-white divide-y divide-gray-200">
                    <!-- Inventory items will be loaded here -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="mt-6 flex justify-between items-center">
            <!-- Pagination will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden bg-white rounded-lg shadow p-12 text-center">
            <i class="fas fa-boxes text-6xl text-gray-300 mb-4"></i>
            <p class="text-xl text-gray-600 mb-4">Hali inventar yo'q</p>
            <button onclick="openAddStockModal()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                <i class="fas fa-plus mr-2"></i>Birinchi Stockni Qo'shish
            </button>
        </div>
    </div>

    <!-- Add Stock Modal -->
    <div id="addStockModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Stock Qo'shish</h2>
                <button onclick="closeAddStockModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <form id="addStockForm" onsubmit="saveStock(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Ombor *</label>
                        <select id="warehouse_id" required class="w-full border rounded-lg p-2">
                            <option value="">Tanlang</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Mahsulot *</label>
                        <select id="product_id" required class="w-full border rounded-lg p-2">
                            <option value="">Tanlang</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Miqdor *</label>
                            <input type="number" id="quantity" required step="0.01" min="0.01" class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Birlik</label>
                            <select id="unit" class="w-full border rounded-lg p-2">
                                <option value="dona">dona</option>
                                <option value="kg">kg</option>
                                <option value="litr">litr</option>
                                <option value="m³">m³</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Min Miqdor</label>
                            <input type="number" id="min_quantity" step="0.01" value="10" class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Max Miqdor</label>
                            <input type="number" id="max_quantity" step="0.01" class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Qayta Buyurtma</label>
                            <input type="number" id="reorder_point" step="0.01" class="w-full border rounded-lg p-2">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Joylashuv</label>
                            <input type="text" id="location" placeholder="Raft A-1" class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Partiya Raqami</label>
                            <input type="text" id="batch_number" class="w-full border rounded-lg p-2">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Muddati</label>
                            <input type="date" id="expiry_date" class="w-full border rounded-lg p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tannarx (bir birlik)</label>
                            <input type="number" id="cost_per_unit" step="0.01" min="0" class="w-full border rounded-lg p-2">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Izoh</label>
                        <textarea id="notes" rows="2" class="w-full border rounded-lg p-2"></textarea>
                    </div>
                </div>

                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="closeAddStockModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">
                        Bekor qilish
                    </button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-save mr-2"></i>Saqlash
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Stock Operation Modal (Add/Remove) -->
    <div id="stockOperationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 id="operationTitle" class="text-2xl font-bold">Stock Operatsiya</h2>
                <button onclick="closeStockOperationModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <form id="stockOperationForm" onsubmit="executeStockOperation(event)">
                <input type="hidden" id="operation_inventory_id">
                <input type="hidden" id="operation_type">

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Miqdor *</label>
                    <input type="number" id="operation_quantity" required step="0.01" min="0.01" class="w-full border rounded-lg p-2">
                    <p id="availableQuantityText" class="text-sm text-gray-500 mt-1"></p>
                </div>

                <div id="removeTypeDiv" class="mb-4 hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Chiqarish turi</label>
                    <select id="remove_type" class="w-full border rounded-lg p-2">
                        <option value="out">Sotish/Chiqarish</option>
                        <option value="damaged">Shikastlangan</option>
                        <option value="expired">Muddati o'tgan</option>
                        <option value="sample">Namuna</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Izoh</label>
                    <textarea id="operation_notes" rows="2" class="w-full border rounded-lg p-2"></textarea>
                </div>

                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeStockOperationModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">
                        Bekor qilish
                    </button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-check mr-2"></i>Tasdiqlash
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Adjust Stock Modal -->
    <div id="adjustStockModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Stock Tuzatish (Inventarizatsiya)</h2>
                <button onclick="closeAdjustStockModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <form id="adjustStockForm" onsubmit="adjustStock(event)">
                <input type="hidden" id="adjust_inventory_id">

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Hozirgi miqdor</label>
                    <input type="number" id="current_quantity" readonly class="w-full border rounded-lg p-2 bg-gray-100">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Yangi miqdor *</label>
                    <input type="number" id="new_quantity" required step="0.01" min="0" class="w-full border rounded-lg p-2">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Sabab *</label>
                    <textarea id="adjust_reason" required rows="3" class="w-full border rounded-lg p-2" placeholder="Inventarizatsiya natijasida..."></textarea>
                </div>

                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeAdjustStockModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">
                        Bekor qilish
                    </button>
                    <button type="submit" class="px-6 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700">
                        <i class="fas fa-wrench mr-2"></i>Tuzatish
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Stock Movements Modal -->
    <div id="movementsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Stock Harakatlar Tarixi</h2>
                <button onclick="closeMovementsModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <div id="movementsContent">
                <!-- Movements will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let currentPage = 1;
        let warehouses = [];
        let products = [];

        // Load user info
        async function loadUserInfo() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/user`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('userName').textContent = data.name;
                } else {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Load warehouses and products for filters
        async function loadFilters() {
            const token = localStorage.getItem('token');

            try {
                const [warehousesRes, productsRes] = await Promise.all([
                    fetch(`${API_URL}/warehouses`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    }),
                    fetch(`${API_URL}/products`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    })
                ]);

                if (warehousesRes.ok) {
                    const data = await warehousesRes.json();
                    warehouses = data.warehouses.data;
                    populateWarehouseFilters();
                }

                if (productsRes.ok) {
                    const data = await productsRes.json();
                    products = data;
                    populateProductFilters();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function populateWarehouseFilters() {
            const filterSelect = document.getElementById('filterWarehouse');
            const addStockSelect = document.getElementById('warehouse_id');

            warehouses.forEach(warehouse => {
                const option = `<option value="${warehouse.id}">${warehouse.name} (${warehouse.region})</option>`;
                filterSelect.innerHTML += option;
                addStockSelect.innerHTML += option;
            });
        }

        function populateProductFilters() {
            const filterSelect = document.getElementById('filterProduct');
            const addStockSelect = document.getElementById('product_id');

            products.forEach(product => {
                const option = `<option value="${product.id}">${product.name}</option>`;
                filterSelect.innerHTML += option;
                addStockSelect.innerHTML += option;
            });
        }

        // Load inventory
        async function loadInventory(page = 1) {
            const token = localStorage.getItem('token');
            currentPage = page;

            const warehouse_id = document.getElementById('filterWarehouse').value;
            const product_id = document.getElementById('filterProduct').value;
            const stock_status = document.getElementById('filterStockStatus').value;
            const sortBy = document.getElementById('sortBy').value;
            const expiry = document.getElementById('filterExpiry').value;

            let url = `${API_URL}/inventory?page=${page}&sort_by=${sortBy}`;
            if (warehouse_id) url += `&warehouse_id=${warehouse_id}`;
            if (product_id) url += `&product_id=${product_id}`;
            if (stock_status) url += `&stock_status=${stock_status}`;
            if (expiry === 'expired') url += `&expired_only=true`;
            if (expiry === 'expiring_soon') url += `&expiring_soon=true`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayInventory(data.inventory.data);
                    displayPagination(data.inventory);
                    loadStatistics();
                    loadAlerts();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Load statistics
        async function loadStatistics() {
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/inventory/statistics/summary`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayStatistics(data.statistics);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display statistics
        function displayStatistics(stats) {
            const statsCards = document.getElementById('statsCards');
            statsCards.innerHTML = `
                <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Jami Mahsulotlar</p>
                            <p class="text-3xl font-bold">${stats.total_products || 0}</p>
                        </div>
                        <i class="fas fa-box text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Mavjud Stock</p>
                            <p class="text-3xl font-bold">${stats.in_stock || 0}</p>
                        </div>
                        <i class="fas fa-check-circle text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Kam Stock</p>
                            <p class="text-3xl font-bold">${stats.low_stock || 0}</p>
                        </div>
                        <i class="fas fa-exclamation-triangle text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-red-500 to-red-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Tugagan</p>
                            <p class="text-3xl font-bold">${stats.out_of_stock || 0}</p>
                        </div>
                        <i class="fas fa-times-circle text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Umumiy Qiymat</p>
                            <p class="text-2xl font-bold">${(stats.total_value || 0).toLocaleString()}</p>
                            <p class="text-xs opacity-80">so'm</p>
                        </div>
                        <i class="fas fa-dollar-sign text-4xl opacity-50"></i>
                    </div>
                </div>
            `;
        }

        // Load alerts
        async function loadAlerts() {
            const token = localStorage.getItem('token');

            try {
                const [lowStockRes, outOfStockRes] = await Promise.all([
                    fetch(`${API_URL}/inventory/low-stock/list`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    }),
                    fetch(`${API_URL}/inventory/out-of-stock/list`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    })
                ]);

                if (lowStockRes.ok && outOfStockRes.ok) {
                    const lowStock = await lowStockRes.json();
                    const outOfStock = await outOfStockRes.json();

                    displayAlerts(lowStock.low_stock_items, outOfStock.out_of_stock_items);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display alerts
        function displayAlerts(lowStock, outOfStock) {
            const alertsDiv = document.getElementById('alerts');
            let html = '';

            if (outOfStock.length > 0) {
                html += `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <div class="flex items-center">
                            <i class="fas fa-times-circle text-red-600 text-2xl mr-3"></i>
                            <div>
                                <p class="font-semibold text-red-800">${outOfStock.length} mahsulot tugagan!</p>
                                <p class="text-sm text-red-600">Stock qo'shishni unutmang</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            if (lowStock.length > 0) {
                html += `
                    <div class="bg-orange-50 border border-orange-200 rounded-lg p-4 ${outOfStock.length > 0 ? 'mt-4' : ''}">
                        <div class="flex items-center">
                            <i class="fas fa-exclamation-triangle text-orange-600 text-2xl mr-3"></i>
                            <div>
                                <p class="font-semibold text-orange-800">${lowStock.length} mahsulot kam qolgan</p>
                                <p class="text-sm text-orange-600">Tez orada tugaydi, buyurtma bering</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            alertsDiv.innerHTML = html;
        }

        // Display inventory
        function displayInventory(inventory) {
            const tbody = document.getElementById('inventoryTableBody');
            const emptyState = document.getElementById('emptyState');

            if (inventory.length === 0) {
                tbody.closest('table').classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            tbody.closest('table').classList.remove('hidden');
            emptyState.classList.add('hidden');

            tbody.innerHTML = inventory.map(item => {
                const statusColor = getStockStatusColor(item.stock_status);
                const statusIcon = getStockStatusIcon(item.stock_status);

                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div>
                                    <p class="font-semibold text-gray-900">${item.product?.name || 'N/A'}</p>
                                    ${item.batch_number ? `<p class="text-xs text-gray-500">Partiya: ${item.batch_number}</p>` : ''}
                                    ${item.location ? `<p class="text-xs text-gray-500">Joylashuv: ${item.location}</p>` : ''}
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600">
                            ${item.warehouse?.name || 'N/A'}
                        </td>
                        <td class="px-6 py-4">
                            <p class="font-semibold">${item.quantity} ${item.unit}</p>
                        </td>
                        <td class="px-6 py-4">
                            <p class="font-semibold text-green-600">${item.available_quantity} ${item.unit}</p>
                        </td>
                        <td class="px-6 py-4">
                            <p class="text-gray-600">${item.reserved_quantity} ${item.unit}</p>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 ${statusColor} text-white text-xs font-semibold rounded">
                                <i class="${statusIcon} mr-1"></i>${item.stock_status_name}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <p class="font-semibold">${(item.total_value || 0).toLocaleString()} so'm</p>
                            ${item.cost_per_unit ? `<p class="text-xs text-gray-500">${item.cost_per_unit} so'm/${item.unit}</p>` : ''}
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex space-x-2">
                                <button onclick="openStockOperationModal(${item.id}, 'add', ${item.available_quantity})"
                                    class="text-green-600 hover:text-green-800" title="Qo'shish">
                                    <i class="fas fa-plus-circle"></i>
                                </button>
                                <button onclick="openStockOperationModal(${item.id}, 'remove', ${item.available_quantity})"
                                    class="text-red-600 hover:text-red-800" title="Chiqarish">
                                    <i class="fas fa-minus-circle"></i>
                                </button>
                                <button onclick="openAdjustModal(${item.id}, ${item.quantity})"
                                    class="text-orange-600 hover:text-orange-800" title="Tuzatish">
                                    <i class="fas fa-wrench"></i>
                                </button>
                                <button onclick="viewMovements(${item.id})"
                                    class="text-blue-600 hover:text-blue-800" title="Tarix">
                                    <i class="fas fa-history"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Display pagination
        function displayPagination(paginationData) {
            const container = document.getElementById('pagination');
            const totalPages = paginationData.last_page;

            container.innerHTML = `
                <div class="text-sm text-gray-600">
                    ${paginationData.from} - ${paginationData.to} / ${paginationData.total}
                </div>
                <div class="flex space-x-2">
                    <button
                        onclick="loadInventory(${currentPage - 1})"
                        ${currentPage === 1 ? 'disabled' : ''}
                        class="px-4 py-2 border rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span class="px-4 py-2">${currentPage} / ${totalPages}</span>
                    <button
                        onclick="loadInventory(${currentPage + 1})"
                        ${currentPage === totalPages ? 'disabled' : ''}
                        class="px-4 py-2 border rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            `;
        }

        // Modals
        function openAddStockModal() {
            document.getElementById('addStockForm').reset();
            document.getElementById('addStockModal').classList.remove('hidden');
        }

        function closeAddStockModal() {
            document.getElementById('addStockModal').classList.add('hidden');
        }

        function openStockOperationModal(inventoryId, operation, availableQty) {
            document.getElementById('operation_inventory_id').value = inventoryId;
            document.getElementById('operation_type').value = operation;
            document.getElementById('operationTitle').textContent = operation === 'add' ? 'Stock Qo\'shish' : 'Stock Chiqarish';
            document.getElementById('availableQuantityText').textContent = `Mavjud: ${availableQty}`;

            if (operation === 'remove') {
                document.getElementById('removeTypeDiv').classList.remove('hidden');
            } else {
                document.getElementById('removeTypeDiv').classList.add('hidden');
            }

            document.getElementById('stockOperationForm').reset();
            document.getElementById('operation_inventory_id').value = inventoryId;
            document.getElementById('operation_type').value = operation;
            document.getElementById('stockOperationModal').classList.remove('hidden');
        }

        function closeStockOperationModal() {
            document.getElementById('stockOperationModal').classList.add('hidden');
        }

        function openAdjustModal(inventoryId, currentQty) {
            document.getElementById('adjust_inventory_id').value = inventoryId;
            document.getElementById('current_quantity').value = currentQty;
            document.getElementById('new_quantity').value = currentQty;
            document.getElementById('adjustStockModal').classList.remove('hidden');
        }

        function closeAdjustStockModal() {
            document.getElementById('adjustStockModal').classList.add('hidden');
        }

        function closeMovementsModal() {
            document.getElementById('movementsModal').classList.add('hidden');
        }

        // Save new stock
        async function saveStock(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');

            const data = {
                warehouse_id: document.getElementById('warehouse_id').value,
                product_id: document.getElementById('product_id').value,
                quantity: document.getElementById('quantity').value,
                unit: document.getElementById('unit').value,
                min_quantity: document.getElementById('min_quantity').value,
                max_quantity: document.getElementById('max_quantity').value || null,
                reorder_point: document.getElementById('reorder_point').value || null,
                location: document.getElementById('location').value || null,
                batch_number: document.getElementById('batch_number').value || null,
                expiry_date: document.getElementById('expiry_date').value || null,
                cost_per_unit: document.getElementById('cost_per_unit').value || null,
                notes: document.getElementById('notes').value || null,
            };

            try {
                const response = await fetch(`${API_URL}/inventory`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeAddStockModal();
                    loadInventory();
                    alert('Stock muvaffaqiyatli qo\'shildi');
                } else {
                    const error = await response.json();
                    alert('Xatolik: ' + (error.message || 'Noma\'lum xatolik'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Xatolik yuz berdi');
            }
        }

        // Execute stock operation (add/remove)
        async function executeStockOperation(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');

            const inventoryId = document.getElementById('operation_inventory_id').value;
            const operation = document.getElementById('operation_type').value;
            const quantity = document.getElementById('operation_quantity').value;
            const notes = document.getElementById('operation_notes').value;

            const endpoint = operation === 'add' ? 'add-stock' : 'remove-stock';
            const data = {
                quantity: quantity,
                notes: notes || null,
            };

            if (operation === 'remove') {
                data.type = document.getElementById('remove_type').value;
            }

            try {
                const response = await fetch(`${API_URL}/inventory/${inventoryId}/${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeStockOperationModal();
                    loadInventory();
                    alert('Operatsiya muvaffaqiyatli bajarildi');
                } else {
                    const error = await response.json();
                    alert('Xatolik: ' + (error.message || 'Noma\'lum xatolik'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Xatolik yuz berdi');
            }
        }

        // Adjust stock
        async function adjustStock(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');

            const inventoryId = document.getElementById('adjust_inventory_id').value;
            const data = {
                new_quantity: document.getElementById('new_quantity').value,
                reason: document.getElementById('adjust_reason').value,
            };

            try {
                const response = await fetch(`${API_URL}/inventory/${inventoryId}/adjust-stock`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeAdjustStockModal();
                    loadInventory();
                    alert('Stock tuzatildi');
                } else {
                    const error = await response.json();
                    alert('Xatolik: ' + (error.message || 'Noma\'lum xatolik'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Xatolik yuz berdi');
            }
        }

        // View stock movements
        async function viewMovements(inventoryId) {
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/inventory/${inventoryId}/movements`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayMovements(data.movements.data);
                    document.getElementById('movementsModal').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display movements
        function displayMovements(movements) {
            const content = document.getElementById('movementsContent');

            if (movements.length === 0) {
                content.innerHTML = '<p class="text-center text-gray-500">Harakatlar yo\'q</p>';
                return;
            }

            content.innerHTML = `
                <div class="space-y-4">
                    ${movements.map(movement => {
                        const typeColor = movement.direction === 'in' ? 'text-green-600' : 'text-red-600';
                        const icon = movement.type_icon;

                        return `
                            <div class="border rounded-lg p-4">
                                <div class="flex items-center justify-between mb-2">
                                    <div class="flex items-center space-x-3">
                                        <i class="fas ${icon} ${typeColor} text-xl"></i>
                                        <div>
                                            <p class="font-semibold">${movement.type_name}</p>
                                            <p class="text-sm text-gray-500">${new Date(movement.created_at).toLocaleString('uz-UZ')}</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="font-bold ${typeColor}">${movement.quantity > 0 ? '+' : ''}${movement.quantity}</p>
                                        <p class="text-xs text-gray-500">${movement.reference_number}</p>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2 text-sm">
                                    <div>
                                        <span class="text-gray-600">Oldin:</span>
                                        <span class="font-semibold">${movement.quantity_before}</span>
                                    </div>
                                    <div>
                                        <span class="text-gray-600">Keyin:</span>
                                        <span class="font-semibold">${movement.quantity_after}</span>
                                    </div>
                                </div>
                                ${movement.notes ? `<p class="text-sm text-gray-600 mt-2">${movement.notes}</p>` : ''}
                                ${movement.reason ? `<p class="text-sm text-gray-600 mt-2"><strong>Sabab:</strong> ${movement.reason}</p>` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // Helper functions
        function getStockStatusColor(status) {
            const colors = {
                'out_of_stock': 'bg-red-500',
                'low_stock': 'bg-orange-500',
                'needs_reorder': 'bg-yellow-500',
                'in_stock': 'bg-green-500'
            };
            return colors[status] || 'bg-gray-500';
        }

        function getStockStatusIcon(status) {
            const icons = {
                'out_of_stock': 'fa-times-circle',
                'low_stock': 'fa-exclamation-triangle',
                'needs_reorder': 'fa-exclamation',
                'in_stock': 'fa-check-circle'
            };
            return icons[status] || 'fa-box';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        // Initialize
        loadUserInfo();
        loadFilters();
        loadInventory();

        // Auto-refresh every 60 seconds
        setInterval(() => {
            loadInventory(currentPage);
        }, 60000);
    </script>
</body>
</html>
