<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGU - Bildirishnomalar</title>
    <!-- AGU Navbar -->
    <script src="components/agu-navbar.js"></script>
    <script src="components/agu-performance.js"></script>
    <!-- AGU Branding -->
    <script src="components/agu-branding.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- AGU Navbar -->
    <div id="agu-navbar"></div>

    <!-- Main Container -->
    <div class="container mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">
                    <i class="fas fa-bell mr-2"></i>Bildirishnomalar
                </h1>
                <p class="text-gray-600 mt-1">Barcha xabarlar va bildirishnomalar</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="markAllAsRead()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    <i class="fas fa-check-double mr-2"></i>Barchasini o'qilgan
                </button>
                <button onclick="deleteRead()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700">
                    <i class="fas fa-trash mr-2"></i>O'qilganlarni o'chirish
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="filterStatus" onchange="loadNotifications()" class="w-full border rounded-lg p-2">
                        <option value="">Hammasi</option>
                        <option value="unread">O'qilmaganlar</option>
                        <option value="read">O'qilganlar</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Turi</label>
                    <select id="filterType" onchange="loadNotifications()" class="w-full border rounded-lg p-2">
                        <option value="">Hammasi</option>
                        <option value="transfer_request">Transfer so'rovlari</option>
                        <option value="transfer_approved">Transfer tasdiqlandi</option>
                        <option value="transfer_rejected">Transfer rad etildi</option>
                        <option value="money_received">Pul keldi</option>
                        <option value="shipment_status_changed">Yuk holati</option>
                        <option value="shipment_delivered">Yuk topshirildi</option>
                        <option value="shipment_issue">Muammo</option>
                        <option value="low_balance">Balans kam</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Prioritet</label>
                    <select id="filterPriority" onchange="loadNotifications()" class="w-full border rounded-lg p-2">
                        <option value="">Hammasi</option>
                        <option value="urgent">Tezkor</option>
                        <option value="high">Yuqori</option>
                        <option value="medium">O'rta</option>
                        <option value="low">Past</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Vaqt</label>
                    <select id="filterTime" onchange="loadNotifications()" class="w-full border rounded-lg p-2">
                        <option value="">Hammasi</option>
                        <option value="recent">So'nggi 7 kun</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Statistics Cards -->
        <div id="statsCards" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <!-- Stats will be loaded here -->
        </div>

        <!-- Notifications List -->
        <div class="bg-white rounded-lg shadow">
            <div id="notificationsList" class="divide-y">
                <!-- Notifications will be loaded here -->
            </div>

            <!-- Pagination -->
            <div id="pagination" class="p-4 border-t flex justify-between items-center">
                <!-- Pagination will be loaded here -->
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden bg-white rounded-lg shadow p-12 text-center">
            <i class="fas fa-bell-slash text-6xl text-gray-300 mb-4"></i>
            <p class="text-xl text-gray-600">Bildirishnoma yo'q</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let currentPage = 1;
        let totalPages = 1;

        // Load user info
        async function loadUserInfo() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/user`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('userName').textContent = data.name;
                } else {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Load statistics
        async function loadStatistics() {
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/notifications/statistics`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayStatistics(data.statistics);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display statistics
        function displayStatistics(stats) {
            const statsCards = document.getElementById('statsCards');
            statsCards.innerHTML = `
                <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Jami</p>
                            <p class="text-3xl font-bold">${stats.total || 0}</p>
                        </div>
                        <i class="fas fa-bell text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">O'qilmagan</p>
                            <p class="text-3xl font-bold">${stats.unread || 0}</p>
                        </div>
                        <i class="fas fa-envelope text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-red-500 to-red-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Tezkor</p>
                            <p class="text-3xl font-bold">${stats.urgent || 0}</p>
                        </div>
                        <i class="fas fa-exclamation-triangle text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Bugun</p>
                            <p class="text-3xl font-bold">${stats.today || 0}</p>
                        </div>
                        <i class="fas fa-calendar-day text-4xl opacity-50"></i>
                    </div>
                </div>
            `;
        }

        // Load notifications
        async function loadNotifications(page = 1) {
            const token = localStorage.getItem('token');
            currentPage = page;

            const status = document.getElementById('filterStatus').value;
            const type = document.getElementById('filterType').value;
            const priority = document.getElementById('filterPriority').value;
            const recentOnly = document.getElementById('filterTime').value === 'recent';

            let url = `${API_URL}/notifications?page=${page}`;

            if (status === 'unread') url += '&is_read=false';
            if (status === 'read') url += '&is_read=true';
            if (type) url += `&type=${type}`;
            if (priority) url += `&priority=${priority}`;
            if (recentOnly) url += '&recent_only=true';

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayNotifications(data.notifications.data);
                    displayPagination(data.notifications);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display notifications
        function displayNotifications(notifications) {
            const container = document.getElementById('notificationsList');
            const emptyState = document.getElementById('emptyState');

            if (notifications.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            container.innerHTML = notifications.map(notification => {
                const iconColor = getIconColor(notification.color);
                const priorityBadge = getPriorityBadge(notification.priority);
                const readClass = notification.is_read ? 'bg-white' : 'bg-blue-50';

                return `
                    <div class="${readClass} p-4 hover:bg-gray-50 transition cursor-pointer" onclick="viewNotification(${notification.id})">
                        <div class="flex items-start space-x-4">
                            <div class="flex-shrink-0">
                                <div class="w-12 h-12 rounded-full ${iconColor} flex items-center justify-center">
                                    <i class="fas ${notification.icon} text-white text-lg"></i>
                                </div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between mb-1">
                                    <p class="font-semibold text-gray-900">${notification.title}</p>
                                    ${priorityBadge}
                                </div>
                                <p class="text-gray-600 text-sm mb-2">${notification.message}</p>
                                <div class="flex items-center space-x-4 text-xs text-gray-500">
                                    <span><i class="far fa-clock mr-1"></i>${notification.time_ago}</span>
                                    ${!notification.is_read ? '<span class="text-blue-600 font-semibold">Yangi</span>' : ''}
                                </div>
                            </div>
                            <div class="flex items-center space-x-2">
                                ${!notification.is_read ? `
                                    <button onclick="markAsRead(${notification.id}, event)" class="p-2 text-blue-600 hover:bg-blue-100 rounded" title="O'qilgan">
                                        <i class="fas fa-check"></i>
                                    </button>
                                ` : ''}
                                <button onclick="deleteNotification(${notification.id}, event)" class="p-2 text-red-600 hover:bg-red-100 rounded" title="O'chirish">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Display pagination
        function displayPagination(paginationData) {
            const container = document.getElementById('pagination');
            totalPages = paginationData.last_page;

            container.innerHTML = `
                <div class="text-sm text-gray-600">
                    ${paginationData.from} - ${paginationData.to} / ${paginationData.total}
                </div>
                <div class="flex space-x-2">
                    <button
                        onclick="loadNotifications(${currentPage - 1})"
                        ${currentPage === 1 ? 'disabled' : ''}
                        class="px-4 py-2 border rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span class="px-4 py-2">${currentPage} / ${totalPages}</span>
                    <button
                        onclick="loadNotifications(${currentPage + 1})"
                        ${currentPage === totalPages ? 'disabled' : ''}
                        class="px-4 py-2 border rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            `;
        }

        // View notification
        async function viewNotification(id) {
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/notifications/${id}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.notification.action_url) {
                        window.location.href = data.notification.action_url;
                    }
                    loadNotifications(currentPage);
                    loadStatistics();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Mark as read
        async function markAsRead(id, event) {
            event.stopPropagation();
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/notifications/${id}/read`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    loadNotifications(currentPage);
                    loadStatistics();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Mark all as read
        async function markAllAsRead() {
            if (!confirm('Barcha bildirishnomalarni o\'qilgan deb belgilaysizmi?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/notifications/mark-all-read`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    loadNotifications(currentPage);
                    loadStatistics();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Delete notification
        async function deleteNotification(id, event) {
            event.stopPropagation();
            if (!confirm('Bildirishnomani o\'chirmoqchimisiz?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/notifications/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    loadNotifications(currentPage);
                    loadStatistics();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Delete read notifications
        async function deleteRead() {
            if (!confirm('Barcha o\'qilgan bildirishnomalarni o\'chirmoqchimisiz?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/notifications/delete-read`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    loadNotifications(1);
                    loadStatistics();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Helper functions
        function getIconColor(color) {
            const colors = {
                'green': 'bg-green-500',
                'blue': 'bg-blue-500',
                'red': 'bg-red-500',
                'orange': 'bg-orange-500',
                'purple': 'bg-purple-500',
                'gray': 'bg-gray-500'
            };
            return colors[color] || 'bg-gray-500';
        }

        function getPriorityBadge(priority) {
            const badges = {
                'urgent': '<span class="px-2 py-1 bg-red-100 text-red-800 text-xs font-semibold rounded">TEZKOR</span>',
                'high': '<span class="px-2 py-1 bg-orange-100 text-orange-800 text-xs font-semibold rounded">YUQORI</span>',
                'medium': '<span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs font-semibold rounded">O\'RTA</span>',
                'low': '<span class="px-2 py-1 bg-gray-100 text-gray-800 text-xs font-semibold rounded">PAST</span>'
            };
            return badges[priority] || '';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        // Initialize
        loadUserInfo();
        loadStatistics();
        loadNotifications();

        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadNotifications(currentPage);
            loadStatistics();
        }, 30000);
    </script>
</body>
</html>
