<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omborlar - AutoGas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-6 py-3">
            <div class="flex items-center justify-between">
                <div class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-gas-pump text-blue-600"></i>
                    AutoGas - Kontragent Panel
                </div>
                <div class="flex items-center space-x-4">
                    <a href="inventory.html" class="text-gray-700 hover:text-blue-600">
                        <i class="fas fa-boxes mr-1"></i>Inventar
                    </a>
                    <span id="userName" class="text-gray-700"></span>
                    <button onclick="logout()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                        <i class="fas fa-sign-out-alt mr-2"></i>Chiqish
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">
                    <i class="fas fa-warehouse mr-2"></i>Omborlar
                </h1>
                <p class="text-gray-600 mt-1">Omborlarni boshqarish va monitoring</p>
            </div>
            <button onclick="openCreateModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                <i class="fas fa-plus mr-2"></i>Yangi Ombor
            </button>
        </div>

        <!-- Statistics Cards -->
        <div id="statsCards" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
            <!-- Stats will be loaded here -->
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Region</label>
                    <select id="filterRegion" onchange="loadWarehouses()" class="w-full border rounded-lg p-2">
                        <option value="">Barcha regionlar</option>
                        <option value="Toshkent">Toshkent</option>
                        <option value="Samarqand">Samarqand</option>
                        <option value="Buxoro">Buxoro</option>
                        <option value="Andijon">Andijon</option>
                        <option value="Farg'ona">Farg'ona</option>
                        <option value="Namangan">Namangan</option>
                        <option value="Qashqadaryo">Qashqadaryo</option>
                        <option value="Surxondaryo">Surxondaryo</option>
                        <option value="Sirdaryo">Sirdaryo</option>
                        <option value="Jizzax">Jizzax</option>
                        <option value="Navoiy">Navoiy</option>
                        <option value="Xorazm">Xorazm</option>
                        <option value="Qoraqalpog'iston">Qoraqalpog'iston</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="filterStatus" onchange="loadWarehouses()" class="w-full border rounded-lg p-2">
                        <option value="">Hammasi</option>
                        <option value="active">Faol</option>
                        <option value="inactive">Faol emas</option>
                        <option value="maintenance">Ta'mirlashda</option>
                        <option value="full">To'lgan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Saralash</label>
                    <select id="sortBy" onchange="loadWarehouses()" class="w-full border rounded-lg p-2">
                        <option value="created_at">Eng yangi</option>
                        <option value="name">Nom</option>
                        <option value="region">Region</option>
                        <option value="capacity_usage_percentage">Sig'im %</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Warehouses Grid -->
        <div id="warehousesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Warehouses will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden bg-white rounded-lg shadow p-12 text-center">
            <i class="fas fa-warehouse text-6xl text-gray-300 mb-4"></i>
            <p class="text-xl text-gray-600 mb-4">Hali ombor yo'q</p>
            <button onclick="openCreateModal()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                <i class="fas fa-plus mr-2"></i>Birinchi Omborni Yaratish
            </button>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="warehouseModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold">Yangi Ombor</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <form id="warehouseForm" onsubmit="saveWarehouse(event)">
                <input type="hidden" id="warehouseId">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Ombor Nomi *</label>
                        <input type="text" id="name" required class="w-full border rounded-lg p-2">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tavsif</label>
                        <textarea id="description" rows="2" class="w-full border rounded-lg p-2"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Region *</label>
                        <select id="region" required class="w-full border rounded-lg p-2">
                            <option value="">Tanlang</option>
                            <option value="Toshkent">Toshkent</option>
                            <option value="Samarqand">Samarqand</option>
                            <option value="Buxoro">Buxoro</option>
                            <option value="Andijon">Andijon</option>
                            <option value="Farg'ona">Farg'ona</option>
                            <option value="Namangan">Namangan</option>
                            <option value="Qashqadaryo">Qashqadaryo</option>
                            <option value="Surxondaryo">Surxondaryo</option>
                            <option value="Sirdaryo">Sirdaryo</option>
                            <option value="Jizzax">Jizzax</option>
                            <option value="Navoiy">Navoiy</option>
                            <option value="Xorazm">Xorazm</option>
                            <option value="Qoraqalpog'iston">Qoraqalpog'iston</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tuman</label>
                        <input type="text" id="district" class="w-full border rounded-lg p-2">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Manzil</label>
                        <input type="text" id="address" class="w-full border rounded-lg p-2">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Telefon</label>
                        <input type="tel" id="phone" class="w-full border rounded-lg p-2" placeholder="+998">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Menejer</label>
                        <input type="text" id="manager_name" class="w-full border rounded-lg p-2">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Umumiy Sig'im</label>
                        <input type="number" id="total_capacity" step="0.01" class="w-full border rounded-lg p-2">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Sig'im Birligi</label>
                        <select id="capacity_unit" class="w-full border rounded-lg p-2">
                            <option value="m³">m³</option>
                            <option value="kg">kg</option>
                            <option value="dona">dona</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="closeModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">
                        Bekor qilish
                    </button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-save mr-2"></i>Saqlash
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- View Details Modal -->
    <div id="detailsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Ombor Tafsilotlari</h2>
                <button onclick="closeDetailsModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <div id="detailsContent">
                <!-- Details will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let currentWarehouse = null;

        // Load user info
        async function loadUserInfo() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/user`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('userName').textContent = data.name;
                } else {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Load warehouses
        async function loadWarehouses() {
            const token = localStorage.getItem('token');

            const region = document.getElementById('filterRegion').value;
            const status = document.getElementById('filterStatus').value;
            const sortBy = document.getElementById('sortBy').value;

            let url = `${API_URL}/warehouses?sort_by=${sortBy}`;
            if (region) url += `&region=${region}`;
            if (status) url += `&status=${status}`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    displayWarehouses(data.warehouses.data);
                    loadStatistics();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Load statistics
        async function loadStatistics() {
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/warehouses`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const warehouses = data.warehouses.data;

                    const stats = {
                        total: warehouses.length,
                        active: warehouses.filter(w => w.is_active).length,
                        total_capacity: warehouses.reduce((sum, w) => sum + (parseFloat(w.total_capacity) || 0), 0),
                        used_capacity: warehouses.reduce((sum, w) => sum + (parseFloat(w.used_capacity) || 0), 0),
                    };

                    displayStatistics(stats);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display statistics
        function displayStatistics(stats) {
            const statsCards = document.getElementById('statsCards');
            const usagePercent = stats.total_capacity > 0 ? ((stats.used_capacity / stats.total_capacity) * 100).toFixed(1) : 0;

            statsCards.innerHTML = `
                <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Jami Omborlar</p>
                            <p class="text-3xl font-bold">${stats.total}</p>
                        </div>
                        <i class="fas fa-warehouse text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Faol Omborlar</p>
                            <p class="text-3xl font-bold">${stats.active}</p>
                        </div>
                        <i class="fas fa-check-circle text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Umumiy Sig'im</p>
                            <p class="text-3xl font-bold">${stats.total_capacity.toFixed(1)}</p>
                            <p class="text-xs opacity-80">m³</p>
                        </div>
                        <i class="fas fa-cubes text-4xl opacity-50"></i>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg shadow p-6 text-white">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-80">Ishlatilgan</p>
                            <p class="text-3xl font-bold">${usagePercent}%</p>
                        </div>
                        <i class="fas fa-chart-pie text-4xl opacity-50"></i>
                    </div>
                </div>
            `;
        }

        // Display warehouses
        function displayWarehouses(warehouses) {
            const container = document.getElementById('warehousesList');
            const emptyState = document.getElementById('emptyState');

            if (warehouses.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            container.innerHTML = warehouses.map(warehouse => {
                const statusColor = getStatusColor(warehouse.status);
                const capacityPercent = warehouse.capacity_usage_percentage || 0;
                const capacityColor = capacityPercent > 90 ? 'bg-red-500' : capacityPercent > 70 ? 'bg-orange-500' : 'bg-green-500';

                return `
                    <div class="bg-white rounded-lg shadow hover:shadow-lg transition p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex-1">
                                <h3 class="text-xl font-bold text-gray-800 mb-1">${warehouse.name}</h3>
                                <p class="text-sm text-gray-600">
                                    <i class="fas fa-map-marker-alt mr-1"></i>${warehouse.region}
                                    ${warehouse.district ? ', ' + warehouse.district : ''}
                                </p>
                                <p class="text-xs text-gray-500 mt-1">
                                    <i class="fas fa-barcode mr-1"></i>${warehouse.code}
                                </p>
                            </div>
                            <span class="px-3 py-1 ${statusColor} text-white text-xs font-semibold rounded-full">
                                ${warehouse.status_name}
                            </span>
                        </div>

                        ${warehouse.total_capacity ? `
                            <div class="mb-4">
                                <div class="flex justify-between text-sm text-gray-600 mb-1">
                                    <span>Sig'im</span>
                                    <span>${capacityPercent}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="${capacityColor} h-2 rounded-full" style="width: ${capacityPercent}%"></div>
                                </div>
                                <div class="flex justify-between text-xs text-gray-500 mt-1">
                                    <span>${warehouse.used_capacity || 0} ${warehouse.capacity_unit}</span>
                                    <span>${warehouse.total_capacity} ${warehouse.capacity_unit}</span>
                                </div>
                            </div>
                        ` : ''}

                        ${warehouse.description ? `
                            <p class="text-sm text-gray-600 mb-4 line-clamp-2">${warehouse.description}</p>
                        ` : ''}

                        <div class="flex space-x-2">
                            <button onclick="viewWarehouse(${warehouse.id})" class="flex-1 px-3 py-2 bg-blue-50 text-blue-600 rounded hover:bg-blue-100 text-sm">
                                <i class="fas fa-eye mr-1"></i>Ko'rish
                            </button>
                            <button onclick="editWarehouse(${warehouse.id})" class="flex-1 px-3 py-2 bg-gray-50 text-gray-600 rounded hover:bg-gray-100 text-sm">
                                <i class="fas fa-edit mr-1"></i>Tahrirlash
                            </button>
                            <button onclick="toggleWarehouseStatus(${warehouse.id})" class="px-3 py-2 ${warehouse.is_active ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-green-50 text-green-600 hover:bg-green-100'} rounded text-sm">
                                <i class="fas fa-power-off"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // View warehouse details
        async function viewWarehouse(id) {
            const token = localStorage.getItem('token');

            try {
                const [warehouseRes, statsRes] = await Promise.all([
                    fetch(`${API_URL}/warehouses/${id}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    }),
                    fetch(`${API_URL}/warehouses/${id}/statistics`, {
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    })
                ]);

                if (warehouseRes.ok && statsRes.ok) {
                    const warehouse = await warehouseRes.json();
                    const stats = await statsRes.json();

                    displayWarehouseDetails(warehouse.warehouse, stats.statistics);
                    document.getElementById('detailsModal').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display warehouse details
        function displayWarehouseDetails(warehouse, stats) {
            const content = document.getElementById('detailsContent');
            const statusColor = getStatusColor(warehouse.status);

            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Basic Info -->
                    <div class="md:col-span-2 bg-gray-50 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xl font-bold">${warehouse.name}</h3>
                            <span class="px-3 py-1 ${statusColor} text-white text-sm font-semibold rounded-full">
                                ${warehouse.status_name}
                            </span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div>
                                <p class="text-gray-600">Kod:</p>
                                <p class="font-semibold">${warehouse.code}</p>
                            </div>
                            <div>
                                <p class="text-gray-600">Region:</p>
                                <p class="font-semibold">${warehouse.region}${warehouse.district ? ', ' + warehouse.district : ''}</p>
                            </div>
                            ${warehouse.address ? `
                                <div class="col-span-2">
                                    <p class="text-gray-600">Manzil:</p>
                                    <p class="font-semibold">${warehouse.address}</p>
                                </div>
                            ` : ''}
                            ${warehouse.phone ? `
                                <div>
                                    <p class="text-gray-600">Telefon:</p>
                                    <p class="font-semibold">${warehouse.phone}</p>
                                </div>
                            ` : ''}
                            ${warehouse.manager_name ? `
                                <div>
                                    <p class="text-gray-600">Menejer:</p>
                                    <p class="font-semibold">${warehouse.manager_name}</p>
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- Statistics -->
                    <div class="bg-blue-50 rounded-lg p-4">
                        <h4 class="font-semibold mb-3 text-blue-900">Mahsulotlar</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-600">Jami mahsulotlar:</span>
                                <span class="font-bold">${stats.total_products || 0}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">Umumiy qiymat:</span>
                                <span class="font-bold">${(stats.total_value || 0).toLocaleString()} so'm</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-green-50 rounded-lg p-4">
                        <h4 class="font-semibold mb-3 text-green-900">Stock</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-600">Jami stock:</span>
                                <span class="font-bold">${stats.total_stock_quantity || 0}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">Mavjud:</span>
                                <span class="font-bold">${stats.available_quantity || 0}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-600">Band:</span>
                                <span class="font-bold">${stats.reserved_quantity || 0}</span>
                            </div>
                        </div>
                    </div>

                    ${warehouse.total_capacity ? `
                        <div class="md:col-span-2 bg-purple-50 rounded-lg p-4">
                            <h4 class="font-semibold mb-3 text-purple-900">Sig'im</h4>
                            <div class="flex justify-between text-sm mb-2">
                                <span>Ishlatilgan: ${warehouse.used_capacity} ${warehouse.capacity_unit}</span>
                                <span>Jami: ${warehouse.total_capacity} ${warehouse.capacity_unit}</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-3">
                                <div class="bg-purple-600 h-3 rounded-full" style="width: ${warehouse.capacity_usage_percentage || 0}%"></div>
                            </div>
                            <p class="text-center text-sm mt-2 font-semibold">${warehouse.capacity_usage_percentage || 0}% ishlatilgan</p>
                        </div>
                    ` : ''}

                    ${stats.low_stock_items > 0 ? `
                        <div class="md:col-span-2 bg-orange-50 border border-orange-200 rounded-lg p-4">
                            <i class="fas fa-exclamation-triangle text-orange-600 mr-2"></i>
                            <span class="text-orange-800 font-semibold">${stats.low_stock_items} mahsulot kam qolgan</span>
                        </div>
                    ` : ''}
                </div>

                <div class="mt-6 flex justify-end space-x-3">
                    <button onclick="closeDetailsModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">
                        Yopish
                    </button>
                    <a href="inventory.html?warehouse_id=${warehouse.id}" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <i class="fas fa-boxes mr-2"></i>Inventarni Ko'rish
                    </a>
                </div>
            `;
        }

        // Open create modal
        function openCreateModal() {
            currentWarehouse = null;
            document.getElementById('modalTitle').textContent = 'Yangi Ombor';
            document.getElementById('warehouseForm').reset();
            document.getElementById('warehouseId').value = '';
            document.getElementById('warehouseModal').classList.remove('hidden');
        }

        // Edit warehouse
        async function editWarehouse(id) {
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/warehouses/${id}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    currentWarehouse = data.warehouse;

                    document.getElementById('modalTitle').textContent = 'Omborni Tahrirlash';
                    document.getElementById('warehouseId').value = currentWarehouse.id;
                    document.getElementById('name').value = currentWarehouse.name;
                    document.getElementById('description').value = currentWarehouse.description || '';
                    document.getElementById('region').value = currentWarehouse.region;
                    document.getElementById('district').value = currentWarehouse.district || '';
                    document.getElementById('address').value = currentWarehouse.address || '';
                    document.getElementById('phone').value = currentWarehouse.phone || '';
                    document.getElementById('manager_name').value = currentWarehouse.manager_name || '';
                    document.getElementById('total_capacity').value = currentWarehouse.total_capacity || '';
                    document.getElementById('capacity_unit').value = currentWarehouse.capacity_unit || 'm³';

                    document.getElementById('warehouseModal').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Save warehouse
        async function saveWarehouse(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');
            const id = document.getElementById('warehouseId').value;

            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                region: document.getElementById('region').value,
                district: document.getElementById('district').value,
                address: document.getElementById('address').value,
                phone: document.getElementById('phone').value,
                manager_name: document.getElementById('manager_name').value,
                total_capacity: document.getElementById('total_capacity').value || null,
                capacity_unit: document.getElementById('capacity_unit').value,
            };

            const url = id ? `${API_URL}/warehouses/${id}` : `${API_URL}/warehouses`;
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    closeModal();
                    loadWarehouses();
                    alert(id ? 'Ombor yangilandi' : 'Ombor yaratildi');
                } else {
                    const error = await response.json();
                    alert('Xatolik: ' + (error.message || 'Noma\'lum xatolik'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Xatolik yuz berdi');
            }
        }

        // Toggle warehouse status
        async function toggleWarehouseStatus(id) {
            if (!confirm('Ombor statusini o\'zgartirmoqchimisiz?')) return;

            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/warehouses/${id}/toggle-status`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    loadWarehouses();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Helper functions
        function getStatusColor(status) {
            const colors = {
                'active': 'bg-green-500',
                'inactive': 'bg-gray-500',
                'maintenance': 'bg-yellow-500',
                'full': 'bg-red-500'
            };
            return colors[status] || 'bg-gray-500';
        }

        function closeModal() {
            document.getElementById('warehouseModal').classList.add('hidden');
        }

        function closeDetailsModal() {
            document.getElementById('detailsModal').classList.add('hidden');
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }

        // Initialize
        loadUserInfo();
        loadWarehouses();
    </script>
</body>
</html>
